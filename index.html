<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>জাবা ইমাজুব - লগইন</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #f0f2f5; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .login-card { background: white; padding: 30px; border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); text-align: center; width: 90%; max-width: 400px; }
        /* লোগোর জন্য বিশেষ স্টাইল */
        .logo { width: 120px; height: 120px; border-radius: 50%; margin-bottom: 15px; object-fit: cover; border: 2px solid #1a73e8; }
        input { width: 100%; padding: 12px; margin: 10px 0; border: 1px solid #ddd; border-radius: 8px; box-sizing: border-box; font-size: 14px; }
        button { width: 100%; padding: 12px; background-color: #1a73e8; color: white; border: none; border-radius: 8px; cursor: pointer; font-size: 16px; font-weight: bold; }
        button:hover { background-color: #1557b0; }
        .status { color: #d93025; font-size: 14px; margin-top: 10px; font-weight: 500; }
        h2 { color: #202124; margin-bottom: 20px; }
    </style>
</head>
<body>

<div class="login-card">
    <img src="logo.png" alt="Zaba Emajub Logo" class="logo">
    <h2>জাবা ইমাজুব ইসলাম</h2>
    <input type="email" id="email" placeholder="আপনার জিমেইল">
    <input type="password" id="password" placeholder="পাসওয়ার্ড">
    <button id="loginBtn">লগইন এবং ভেরিফিকেশন পাঠান</button>
    <p id="msg" class="status"></p>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getAuth, signInWithEmailAndPassword, sendEmailVerification, setPersistence, browserLocalPersistence } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

    const firebaseConfig = {
        apiKey: "AIzaSyCNz3Yem6XpXw7pNW7X5x2NEgh-bNEAEF4",
        authDomain: "zaba-emajub-islam.firebaseapp.com",
        projectId: "zaba-emajub-islam",
        storageBucket: "zaba-emajub-islam.firebasestorage.app",
        messagingSenderId: "92161406507",
        appId: "1:92161406507:web:7bb40f95d337f532dedc6e"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);

    document.getElementById('loginBtn').addEventListener('click', () => {
        const email = document.getElementById('email').value;
        const password = document.getElementById('password').value;
        const msg = document.getElementById('msg');
        msg.style.color = "#d93025"; // ডিফল্ট লাল রঙ ভুলের জন্য

        setPersistence(auth, browserLocalPersistence).then(() => {
            return signInWithEmailAndPassword(auth, email, password);
        })
        .then((userCredential) => {
            const user = userCredential.user;
            if (!user.emailVerified) {
                sendEmailVerification(user);
                msg.style.color = "#188038"; // সাকসেস মেসেজের জন্য সবুজ রঙ
                msg.innerText = "ভেরিফিকেশন লিঙ্ক পাঠানো হয়েছে। আপনার ইমেইল চেক করুন।";
            } else {
                window.location.href = "dashboard.html"; 
            }
        })
        .catch((error) => { 
            msg.innerText = "ভুল ইমেইল বা পাসওয়ার্ড!"; 
            console.error(error);
        });
    });
</script>
</body>
</html>
